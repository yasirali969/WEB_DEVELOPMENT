<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Form</title>

<style>
/* Center the form */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #f2f2f2;
}

/* Form box */
form {
    width: 350px;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
    background: lightgreen;
}

/* Labels */
label {
    display: block;
    margin-top: 10px;
    font-size: 18px;
}

/* Text fields */
input:not([type="radio"]),
select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    box-sizing: border-box;
}

/* DOB */
.dob-container {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.dob {
    width: 33%;
}

/* Gender */
.gender {
    display: flex;
    align-items: center;
    gap: 25px;
    margin-top: 10px;
}

.gender label {
    display: flex;
    align-items: center;
    gap: 5px;
    margin: 0;
    font-size: 18px;
}

.gender input[type="radio"] {
    width: auto;
}

button{
    margin: 20px 0px 0px 130px;
    padding-left: 10px;
    height: 35px;
    width: 90px;
    color: rebeccapurple;
    background-color: yellow;
}
</style>

</head>
<body>

<form>

    <label>Student Name :</label>
    <input type="text" placeholder="Enter Student Name">

    <label>Father Name :</label>
    <input type="text" placeholder="Enter Father Name">

    <label>Roll No :</label>
    <input type="number" placeholder="Enter Roll No">

    <label>Mobile No :</label>
    <select>
        <option>+92</option>
        <option>+91</option>
        <option>+93</option>
        <option>+94</option>
    </select>

    <input type="number" placeholder="Enter 9 Digit Number">

    <label>Date of Birth :</label>

    <div class="dob-container">
        <input type="text" class="dob" placeholder="Day">
        <input type="text" class="dob" placeholder="Month">
        <input type="number" class="dob" placeholder="Year">
    </div>

    <label>Email ID :</label>
    <input type="email" placeholder="Enter Email">

    <label>Password :</label>
    <input type="password" placeholder="Enter Password">

    <label>Gender :</label>

    <div class="gender">
        <label>
            <input type="radio" name="gender" value="Male">
            Male
        </label>

        <label>
            <input type="radio" name="gender" value="Female">
            Female
        </label>
    </div>

    <label>City :</label>
    <input type="text" placeholder="Enter City">

    <button>Login</button>
</form>

</body>
</html>
